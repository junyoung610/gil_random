<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>탁구대회 랜덤 뽑기</title>
    <link rel="stylesheet" href="./css/style.css" />
    <style></style>
  </head>
  <body>
    <div class="wrap">
      <h1 class="page-title">🏓 탁구대회 랜덤 뽑기</h1>

      <div class="layout">
        <!-- 좌측 -->
        <div class="left-panel">
          <div class="card">
            <p class="section-label title-style">기관 선택</p>
            <div class="org-grid" id="orgGrid"></div>
          </div>

          <div class="card" id="memberCard">
            <p class="empty-hint">기관을 선택해주세요</p>
          </div>
        </div>

        <!-- 우측 -->
        <div class="right-panel">
          <div class="result-card" id="resultCard">
            <div class="trophy" id="trophy">🏓</div>
            <p class="result-label">선정된 회원</p>
            <div class="result-name" id="resultName"></div>
            <div class="result-org" id="resultOrg"></div>
          </div>
          <button class="draw-btn" id="drawBtn" disabled onclick="startDraw()">🎲 뽑기 시작</button>
        </div>
      </div>
    </div>

    <script src="./js/script.js"></script>
  </body>
</html>
